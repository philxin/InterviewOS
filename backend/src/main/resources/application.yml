spring:
  application:
    name: InterviewOS
  profiles:
    # 可选：dev-postgres / dev-mysql / prod-postgres / prod-mysql
    active: ${SPRING_PROFILES_ACTIVE:dev-postgres}
    group:
      dev-postgres:
        - common
        - postgres
        - redis
      dev-mysql:
        - common
        - mysql
        - redis
      prod-postgres:
        - common
        - postgres
        - redis
        - prod
      prod-mysql:
        - common
        - mysql
        - redis
        - prod
