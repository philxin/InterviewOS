# =============================
# 项目通用启动配置
# =============================
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: ${SERVER_CONTEXT_PATH:/api}
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: ${GRACEFUL_SHUTDOWN_TIMEOUT:20s}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL:true}
        jdbc:
          time_zone: ${DB_TIME_ZONE:UTC}
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
          temperature: ${OPENAI_CHAT_TEMPERATURE:0.7}
      embedding:
        enabled: ${OPENAI_EMBEDDING_ENABLED:true}
        options:
          model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-large}
          dimensions: ${OPENAI_EMBEDDING_DIMENSIONS:3072}

# =============================
# 双数据库并存配置（统一维护）
# 运行时通过 profile 选择生效的数据源
# =============================
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
    allowed-methods: ${APP_CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
    allowed-headers: ${APP_CORS_ALLOWED_HEADERS:Authorization,Content-Type,Accept,X-Requested-With}
    exposed-headers: ${APP_CORS_EXPOSED_HEADERS:Location}
    allow-credentials: ${APP_CORS_ALLOW_CREDENTIALS:true}
    max-age: ${APP_CORS_MAX_AGE:3600}
  security:
    jwt:
      secret: ${JWT_SECRET:}
      issuer: ${JWT_ISSUER:InterviewOS}
    login-session:
      ttl: ${LOGIN_SESSION_TTL:${JWT_EXPIRES_IN:P7D}}
      key-prefix: "${LOGIN_SESSION_KEY_PREFIX:auth:session:}"
    registration-invitation:
      ttl: ${REGISTRATION_INVITATION_TTL:P7D}
      registration-path-prefix: ${REGISTRATION_INVITATION_PATH_PREFIX:/invite/}
  datasource:
    primary: ${APP_PRIMARY_DATASOURCE:postgresql}
    pool:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
      validation-timeout: ${DB_VALIDATION_TIMEOUT_MS:5000}
    mysql:
      url: ${MYSQL_URL:jdbc:mysql://localhost:3306/interview_os?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC}
      username: ${MYSQL_USERNAME:root}
      password: ${MYSQL_PASSWORD:}
      driver-class-name: com.mysql.cj.jdbc.Driver
      dialect: org.hibernate.dialect.MySQLDialect
    postgresql:
      url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/interview_os}
      username: ${POSTGRES_USERNAME:postgres}
      password: ${POSTGRES_PASSWORD:}
      driver-class-name: org.postgresql.Driver
      dialect: org.hibernate.dialect.PostgreSQLDialect
  rag:
    embedding-model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-large}
    embedding-dimensions: ${OPENAI_EMBEDDING_DIMENSIONS:3072}
    chunk-size: ${APP_RAG_CHUNK_SIZE:1200}
    chunk-overlap: ${APP_RAG_CHUNK_OVERLAP:200}
    min-chunk-length: ${APP_RAG_MIN_CHUNK_LENGTH:80}
    max-chunks-per-document: ${APP_RAG_MAX_CHUNKS_PER_DOCUMENT:128}
    search-top-k: ${APP_RAG_SEARCH_TOP_K:5}
    min-similarity-score: ${APP_RAG_MIN_SIMILARITY_SCORE:0.25}

logging:
  pattern:
    level: "%5p [requestId:%X{requestId:-N/A}]"
  level:
    com.philxin.interviewos: ${APP_LOG_LEVEL:INFO}
    org.springframework.ai: ${SPRING_AI_LOG_LEVEL:INFO}
    org.springframework.web: ${SPRING_WEB_LOG_LEVEL:INFO}
